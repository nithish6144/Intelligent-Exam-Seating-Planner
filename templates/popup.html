<style>
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  width: 300px;
  animation: scaleIn 0.2s ease;
}

@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.popup input {
  width: 80%;
  padding: 8px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #c7dbff;
}
</style>

<div id="roomPopup" class="popup">
  <div class="popup-content">
    <h3>Add Room</h3>

    <input type="text" id="popupRoomNo" placeholder="Enter Room No (e.g. 1001)">

    <div style="margin-top:10px;">
      <button onclick="confirmAddRoom()">Add</button>
      <button onclick="closePopup()" style="background:#ccc; color:#000;">Cancel</button>
    </div>
  </div>
</div>
